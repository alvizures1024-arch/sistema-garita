version: '3.9'

services:
  db:
    image: postgres:15
    container_name: login_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: logindb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: login_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:secret123@db:5432/logindb
      SECRET_KEY: supersecretkey
    depends_on:
      - db

  frontend:
    image: nginx:alpine
    container_name: login_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  postgres_data: